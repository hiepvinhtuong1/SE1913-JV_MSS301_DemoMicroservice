spring.application.name=order-service
server.port=8083

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:9001/eureka/}

spring.datasource.url=${ORDER_DB_URL:jdbc:sqlserver://localhost:1433;databaseName=OrderServiceDb;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${ORDER_DB_USERNAME:sa}
spring.datasource.password=${ORDER_DB_PASSWORD:Hiep2004}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
