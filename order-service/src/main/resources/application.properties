spring.application.name=order-service
server.port=8080

spring.datasource.url=${ORDER_DB_URL:jdbc:sqlserver://localhost:1433;databaseName=OrderServiceDb;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${ORDER_DB_USERNAME:sa}
spring.datasource.password=${ORDER_DB_PASSWORD:YourStrong!Passw0rd}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

services.account.url=${ACCOUNT_SERVICE_URL:http://localhost:8081}
services.orchid.url=${ORCHID_SERVICE_URL:http://localhost:8082}
