spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:9001/eureka/}

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=account-service
spring.cloud.gateway.routes[0].uri=lb://account-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/accounts/**

spring.cloud.gateway.routes[1].id=orchid-service
spring.cloud.gateway.routes[1].uri=lb://orchid-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/orchids/**

spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://order-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/orders/**

spring.cloud.gateway.routes[3].id=account-service-docs
spring.cloud.gateway.routes[3].uri=lb://account-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/account-service/v3/api-docs/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/account-service/(?<segment>.*), /$\{segment}

spring.cloud.gateway.routes[4].id=orchid-service-docs
spring.cloud.gateway.routes[4].uri=lb://orchid-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/orchid-service/v3/api-docs/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/orchid-service/(?<segment>.*), /$\{segment}

spring.cloud.gateway.routes[5].id=order-service-docs
spring.cloud.gateway.routes[5].uri=lb://order-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/order-service/v3/api-docs/**
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/order-service/(?<segment>.*), /$\{segment}

springdoc.swagger-ui.urls[0].name=Account Service
springdoc.swagger-ui.urls[0].url=/account-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=Orchid Service
springdoc.swagger-ui.urls[1].url=/orchid-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Order Service
springdoc.swagger-ui.urls[2].url=/order-service/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
