spring.application.name=account-service
server.port=8081

spring.datasource.url=${ACCOUNT_DB_URL:jdbc:sqlserver://localhost:1433;databaseName=AccountServiceDb;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${ACCOUNT_DB_USERNAME:sa}
spring.datasource.password=${ACCOUNT_DB_PASSWORD:YourStrong!Passw0rd}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
